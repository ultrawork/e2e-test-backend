services:
  backend:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/notes
      JWT_SECRET: ${JWT_SECRET:-e2e-test-secret-key-ultrawork}
      JWT_ENABLED: "true"
      PORT: "3000"
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:3000,http://localhost:4000,http://localhost:8081,http://localhost:19006}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
